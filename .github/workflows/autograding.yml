name: Autograding
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  autograding:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --no-cache-dir pytest nbformat
      - name: Run deliverable checks
        run: pytest tests/test_deliverables.py -v --tb=short 2>&1 || true
      - name: Summary
        if: always()
        run: |
          echo "## Lab 6 — Autograding Results" >> $GITHUB_STEP_SUMMARY
          pytest tests/test_deliverables.py -v --tb=line 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true
